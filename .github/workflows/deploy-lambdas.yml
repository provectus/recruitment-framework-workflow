name: Deploy Lambdas

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/lambdas/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: lauter
  LAMBDAS_DIR: app/lambdas

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app/lambdas
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Test
        run: uv run pytest

  deploy:
    name: Package & Deploy
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/lauter-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Package shared layer
        run: |
          set -euo pipefail
          LAYER_DIR=$(mktemp -d)

          mkdir -p "$LAYER_DIR/python/shared"
          cp -r $LAMBDAS_DIR/shared/* "$LAYER_DIR/python/shared/"
          find "$LAYER_DIR" -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

          pip install --target "$LAYER_DIR/python" --platform manylinux2014_x86_64 --only-binary=:all: --no-deps \
            -r $LAMBDAS_DIR/requirements-layer.txt

          cd "$LAYER_DIR"
          zip -r "$GITHUB_WORKSPACE/shared-layer.zip" python/
          echo "LAYER_ZIP=$GITHUB_WORKSPACE/shared-layer.zip" >> "$GITHUB_ENV"

      - name: Publish shared layer version
        id: publish-layer
        run: |
          set -euo pipefail
          LAYER_VERSION_ARN=$(aws lambda publish-layer-version \
            --layer-name "$PROJECT_NAME-lambda-shared" \
            --zip-file "fileb://$LAYER_ZIP" \
            --compatible-runtimes python3.12 \
            --description "Shared utilities + dependencies (commit ${{ github.sha }})" \
            --query 'LayerVersionArn' \
            --output text)

          echo "layer_version_arn=$LAYER_VERSION_ARN" >> "$GITHUB_OUTPUT"
          echo "Published layer: $LAYER_VERSION_ARN"

      - name: Package and deploy functions
        env:
          LAYER_VERSION_ARN: ${{ steps.publish-layer.outputs.layer_version_arn }}
        run: |
          set -euo pipefail

          FUNCTIONS=(
            "cv-analysis:cv_analysis"
            "screening-eval:screening_eval"
            "technical-eval:technical_eval"
            "recommendation:recommendation"
            "feedback-gen:feedback_gen"
          )

          for entry in "${FUNCTIONS[@]}"; do
            FUNC_NAME="${entry%%:*}"
            SOURCE_DIR="${entry##*:}"
            FULL_NAME="$PROJECT_NAME-$FUNC_NAME"
            ZIP_FILE="/tmp/${FUNC_NAME}.zip"

            echo "::group::Deploying $FULL_NAME"

            cd "$GITHUB_WORKSPACE/$LAMBDAS_DIR/$SOURCE_DIR"
            find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
            zip -r "$ZIP_FILE" . -x '*.pyc'

            aws lambda update-function-code \
              --function-name "$FULL_NAME" \
              --zip-file "fileb://$ZIP_FILE" \
              --query 'FunctionName' \
              --output text

            aws lambda wait function-updated --function-name "$FULL_NAME"

            aws lambda update-function-configuration \
              --function-name "$FULL_NAME" \
              --layers "$LAYER_VERSION_ARN" \
              --query 'FunctionName' \
              --output text

            aws lambda wait function-updated --function-name "$FULL_NAME"

            echo "Deployed $FULL_NAME"
            echo "::endgroup::"
          done

          echo "All functions deployed successfully"
