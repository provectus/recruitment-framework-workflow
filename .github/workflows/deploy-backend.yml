name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/backend/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: lauter-backend
  ECS_CLUSTER: lauter-cluster
  ECS_SERVICE: lauter-backend

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app/backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --group dev --group test

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check
        run: uv run mypy app/

      - name: Security scan
        run: uv run bandit -r app/ -c pyproject.toml

      - name: Test
        run: uv run pytest
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          JWT_SECRET_KEY: dev-secret-change-in-production
          DEBUG: "true"
          COOKIE_SECURE: "false"
          COGNITO_USER_POOL_ID: us-east-1_XXXXXXXXX
          COGNITO_CLIENT_ID: ci_test
          COGNITO_CLIENT_SECRET: ci_test
          COGNITO_DOMAIN: test.auth.us-east-1.amazoncognito.com

  deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/lauter-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@4625ce35226a7557230889aae2f52eb50ec3dcda # v2.0.1

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --target prod -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest app/backend/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Register new task definition
        id: register-task-def
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          CURRENT_TASK_DEF=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --query 'services[0].taskDefinition' \
            --output text)

          TASK_DEF_JSON=$(aws ecs describe-task-definition \
            --task-definition "$CURRENT_TASK_DEF" \
            --query 'taskDefinition')

          NEW_TASK_DEF=$(echo "$TASK_DEF_JSON" | jq \
            --arg IMAGE "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            '.containerDefinitions[0].image = $IMAGE |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "task_def_arn=$NEW_TASK_DEF_ARN" >> "$GITHUB_OUTPUT"

      - name: Check for new migrations
        id: check-migrations
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_migrations=true" >> "$GITHUB_OUTPUT"
            echo "::notice::workflow_dispatch — running migrations unconditionally"
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "has_migrations=true" >> "$GITHUB_OUTPUT"
            echo "::notice::New branch push — running migrations unconditionally"
          elif git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- app/backend/migrations/versions/ | grep -q .; then
            echo "has_migrations=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Migration changes detected"
          else
            echo "has_migrations=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No migration changes detected — skipping migration task"
          fi

      - name: Run database migrations
        if: steps.check-migrations.outputs.has_migrations == 'true'
        run: |
          set -euo pipefail

          NETWORK_CONFIG=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --query 'services[0].networkConfiguration' \
            --output json)

          if [ "$NETWORK_CONFIG" = "null" ] || [ -z "$NETWORK_CONFIG" ]; then
            echo "::error::Could not retrieve network configuration from ECS service"
            exit 1
          fi

          OVERRIDES='{"containerOverrides":[{"name":"lauter-backend","command":["uv","run","alembic","upgrade","head"],"environment":[{"name":"APP_RUN_MIGRATIONS","value":"false"}]}]}'

          TASK_ARN=$(aws ecs run-task \
            --cluster $ECS_CLUSTER \
            --task-definition "${{ steps.register-task-def.outputs.task_def_arn }}" \
            --launch-type FARGATE \
            --network-configuration "$NETWORK_CONFIG" \
            --overrides "$OVERRIDES" \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster $ECS_CLUSTER --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster $ECS_CLUSTER \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migration failed with exit code $EXIT_CODE"
            aws ecs describe-tasks --cluster $ECS_CLUSTER --tasks "$TASK_ARN" \
              --query 'tasks[0].containers[0].reason' --output text
            exit 1
          fi

          echo "Migrations completed successfully"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --task-definition "${{ steps.register-task-def.outputs.task_def_arn }}"

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE
