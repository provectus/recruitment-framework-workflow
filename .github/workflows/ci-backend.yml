name: CI Backend

on:
  pull_request:
    branches: [main]
    paths:
      - "app/backend/**"

permissions:
  contents: read

jobs:
  check:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app/backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --group dev --group test

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check
        run: uv run mypy app/

      - name: Security scan
        run: uv run bandit -r app/ -c pyproject.toml

      - name: Test
        run: uv run pytest
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          JWT_SECRET_KEY: dev-secret-change-in-production
          DEBUG: "true"
          COOKIE_SECURE: "false"
          COGNITO_USER_POOL_ID: us-east-1_XXXXXXXXX
          COGNITO_CLIENT_ID: ci_test
          COGNITO_CLIENT_SECRET: ci_test
          COGNITO_DOMAIN: test.auth.us-east-1.amazoncognito.com

  openapi-check:
    name: OpenAPI Spec Up-to-date
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: app/backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Regenerate OpenAPI spec
        run: uv run python scripts/export_openapi.py
        env:
          PYTHONPATH: .
          DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/ci
          JWT_SECRET_KEY: dev-secret-change-in-production
          CORS_ORIGINS: '["http://localhost:5173"]'
          DEBUG: "true"
          COOKIE_DOMAIN: ""
          COOKIE_SECURE: "false"
          ALLOWED_EMAIL_DOMAIN: provectus.com
          COGNITO_USER_POOL_ID: us-east-1_XXXXXXXXX
          COGNITO_CLIENT_ID: your_client_id_here
          COGNITO_CLIENT_SECRET: your_client_secret_here
          COGNITO_DOMAIN: your-cognito-domain.auth.us-east-1.amazoncognito.com
          COGNITO_REDIRECT_URI: http://localhost:8000/auth/callback

      - name: Check spec is up-to-date
        run: |
          git diff --exit-code app/frontend/openapi.json || {
            echo "::error::OpenAPI spec is out of date. Run 'uv run python scripts/export_openapi.py' from app/backend/ and commit the result."
            exit 1
          }
        working-directory: .
