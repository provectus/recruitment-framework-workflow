services:
  db:
    image: postgres:16
    ports:
      - "5437:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tap
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/tap-files
      "

  backend:
    build:
      context: ./app/backend
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - ./app/backend:/app
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - ./app/backend/.env
    environment:
      DEBUG: true
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/tap
      S3_BUCKET_NAME: tap-files
      S3_ENDPOINT_URL: http://minio:9000
      S3_PRESIGN_ENDPOINT_URL: http://localhost:9100
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin

volumes:
  postgres_data:
  minio_data:
